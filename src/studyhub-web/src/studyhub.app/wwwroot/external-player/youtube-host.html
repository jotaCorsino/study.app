<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <title>StudyHub External Player</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }

        #player-shell, #player {
            width: 100%;
            height: 100%;
            background: #000;
        }
    </style>
</head>
<body>
    <div id="player-shell">
        <div id="player"></div>
    </div>

    <script>
        const query = new URLSearchParams(window.location.search);
        function parseRate(value, fallback) {
            const parsed = Number(value);
            if (!Number.isFinite(parsed) || parsed <= 0) {
                return fallback;
            }

            return parsed;
        }

        function parseStartOffsetSeconds(value) {
            const parsed = Number(value);
            if (!Number.isFinite(parsed) || parsed <= 0) {
                return 0;
            }

            return parsed;
        }

        const studyHubPlayerConfig = {
            sessionToken: query.get("session") || "0",
            videoId: query.get("videoId") || "",
            courseId: query.get("courseId") || "",
            lessonId: query.get("lessonId") || "",
            externalUrl: query.get("externalUrl") || "",
            provider: query.get("provider") || "YouTube",
            initialRate: parseRate(query.get("initialRate"), 1),
            initialStartOffsetSeconds: parseStartOffsetSeconds(query.get("initialStartOffset"))
        };

        const schemeBase = "studyhub-external://event";
        const widgetReferrer = `${window.location.origin}/course/${studyHubPlayerConfig.courseId}/lesson/${studyHubPlayerConfig.lessonId}`;
        let player = null;
        let progressTimerId = 0;
        let apiTimeoutId = 0;
        let targetPlaybackRate = studyHubPlayerConfig.initialRate;
        let startupSeekApplied = false;

        function notify(type, payload) {
            const message = Object.assign({
                session: String(studyHubPlayerConfig.sessionToken),
                type
            }, payload || {});

            if (window.chrome && window.chrome.webview && typeof window.chrome.webview.postMessage === "function") {
                window.chrome.webview.postMessage(JSON.stringify(message));
                return;
            }

            try {
                const url = new URL(schemeBase);
                Object.entries(message).forEach(([key, value]) => {
                    if (value !== undefined && value !== null && value !== "") {
                        url.searchParams.set(key, String(value));
                    }
                });

                window.location.href = url.toString();
            } catch (error) {
            }
        }

        function clearProgressTimer() {
            if (progressTimerId !== 0) {
                window.clearInterval(progressTimerId);
                progressTimerId = 0;
            }
        }

        function emitProgress() {
            if (!player || typeof player.getCurrentTime !== "function" || typeof player.getDuration !== "function") {
                return;
            }

            const position = Number(player.getCurrentTime() || 0);
            const duration = Number(player.getDuration() || 0);
            if (!Number.isFinite(position) || !Number.isFinite(duration) || duration <= 0) {
                return;
            }

            notify("progress", {
                position: position.toFixed(3),
                duration: duration.toFixed(3)
            });
        }

        function startProgressTimer() {
            clearProgressTimer();
            progressTimerId = window.setInterval(emitProgress, 10000);
        }

        function parseBridgeMessage(payload) {
            if (payload === null || payload === undefined) {
                return null;
            }

            if (typeof payload === "string") {
                try {
                    const parsed = JSON.parse(payload);
                    return parsed && typeof parsed === "object" ? parsed : null;
                } catch (error) {
                    return null;
                }
            }

            return typeof payload === "object" ? payload : null;
        }

        function selectBestAvailableRate(requestedRate) {
            if (!player || typeof player.getAvailablePlaybackRates !== "function") {
                return requestedRate;
            }

            const availableRates = player.getAvailablePlaybackRates()
                .map(rate => Number(rate))
                .filter(rate => Number.isFinite(rate) && rate > 0);

            if (!availableRates.length) {
                return requestedRate;
            }

            if (availableRates.some(rate => Math.abs(rate - requestedRate) < 0.001)) {
                return requestedRate;
            }

            const lowerOrEqualRates = availableRates.filter(rate => rate <= requestedRate + 0.001);
            if (lowerOrEqualRates.length) {
                return Math.max(...lowerOrEqualRates);
            }

            return availableRates.reduce((bestRate, currentRate) => {
                return Math.abs(currentRate - requestedRate) < Math.abs(bestRate - requestedRate)
                    ? currentRate
                    : bestRate;
            }, availableRates[0]);
        }

        function emitPlaybackRate(reason, requestedRateOverride) {
            if (!player || typeof player.getPlaybackRate !== "function") {
                return;
            }

            const requestedRate = Number.isFinite(requestedRateOverride)
                ? requestedRateOverride
                : targetPlaybackRate;
            const effectiveRate = Number(player.getPlaybackRate() || 0);
            if (!Number.isFinite(effectiveRate) || effectiveRate <= 0) {
                return;
            }

            notify("rate", {
                requested: requestedRate.toFixed(3),
                applied: effectiveRate.toFixed(3),
                fallback: Math.abs(effectiveRate - requestedRate) > 0.001 ? "true" : "false",
                reason: reason || ""
            });
        }

        function applyPlaybackRate(reason) {
            if (!player || typeof player.setPlaybackRate !== "function") {
                return;
            }

            const requestedRate = targetPlaybackRate;
            const rateToApply = selectBestAvailableRate(requestedRate);

            try {
                player.setPlaybackRate(rateToApply);
            } catch (error) {
            }

            window.setTimeout(function () {
                emitPlaybackRate(reason, requestedRate);
            }, 120);
        }

        function applyStartupSeekOnce(reason) {
            if (startupSeekApplied ||
                !player ||
                typeof player.seekTo !== "function") {
                return;
            }

            const configuredOffset = Number(studyHubPlayerConfig.initialStartOffsetSeconds || 0);
            if (!Number.isFinite(configuredOffset) || configuredOffset <= 0) {
                startupSeekApplied = true;
                return;
            }

            startupSeekApplied = true;

            let safeOffset = configuredOffset;
            const duration = typeof player.getDuration === "function"
                ? Number(player.getDuration() || 0)
                : 0;
            if (Number.isFinite(duration) && duration > 0 && safeOffset > duration) {
                safeOffset = duration;
            }

            if (!Number.isFinite(safeOffset) || safeOffset <= 0) {
                return;
            }

            try {
                player.seekTo(safeOffset, true);
                notify("startup-seek-applied", {
                    offset: safeOffset.toFixed(3),
                    reason: reason || ""
                });
            } catch (error) {
                notify("startup-seek-failed", {
                    offset: safeOffset.toFixed(3),
                    reason: reason || ""
                });
            }
        }

        function handleHostMessage(payload) {
            const message = parseBridgeMessage(payload);
            if (!message) {
                return;
            }

            const messageType = String(message.type || "").trim().toLowerCase();
            if (messageType !== "set-rate") {
                return;
            }

            if (String(message.session || "") !== String(studyHubPlayerConfig.sessionToken)) {
                return;
            }

            targetPlaybackRate = parseRate(message.rate, targetPlaybackRate);
            if (player) {
                applyPlaybackRate("host-command");
            }
        }

        window.studyHubExternalPlayerBridge = {
            receive(payload) {
                handleHostMessage(payload);
            }
        };

        if (window.chrome &&
            window.chrome.webview &&
            typeof window.chrome.webview.addEventListener === "function") {
            window.chrome.webview.addEventListener("message", function (event) {
                handleHostMessage(event.data);
            });
        }

        function onYouTubeIframeAPIReady() {
            clearTimeout(apiTimeoutId);

            player = new YT.Player("player", {
                width: "100%",
                height: "100%",
                host: "https://www.youtube.com",
                videoId: studyHubPlayerConfig.videoId,
                playerVars: {
                    autoplay: 0,
                    controls: 1,
                    enablejsapi: 1,
                    origin: window.location.origin,
                    widget_referrer: widgetReferrer,
                    rel: 0,
                    playsinline: 1,
                    modestbranding: 1,
                    fs: 1,
                    iv_load_policy: 3
                },
                events: {
                    onReady: function (event) {
                        const duration = Number(event.target.getDuration() || 0);
                        notify("ready", {
                            duration: Number.isFinite(duration) ? duration.toFixed(3) : "0"
                        });
                        applyStartupSeekOnce("player-ready");
                        applyPlaybackRate("player-ready");
                    },
                    onStateChange: function (event) {
                        notify("state", { state: event.data });
                        emitPlaybackRate("state-change");

                        switch (event.data) {
                            case YT.PlayerState.PLAYING:
                                startProgressTimer();
                                break;
                            case YT.PlayerState.PAUSED:
                                emitProgress();
                                clearProgressTimer();
                                break;
                            case YT.PlayerState.ENDED:
                                clearProgressTimer();
                                notify("ended", {
                                    duration: Number(event.target.getDuration() || 0).toFixed(3)
                                });
                                break;
                            default:
                                clearProgressTimer();
                                break;
                        }
                    },
                    onPlaybackRateChange: function (event) {
                        emitPlaybackRate("playback-rate-change");
                    },
                    onError: function (event) {
                        clearProgressTimer();
                        notify("error", { code: event.data });
                    }
                }
            });
        }

        if (!studyHubPlayerConfig.videoId) {
            notify("error", { code: "missing-video-id" });
        } else {
            window.onYouTubeIframeAPIReady = onYouTubeIframeAPIReady;
            window.onerror = function (message) {
                notify("bridge-error", {
                    message: String(message || "Unexpected external player bridge error")
                });
                return false;
            };

            apiTimeoutId = window.setTimeout(function () {
                notify("error", { code: "api-timeout" });
            }, 15000);

            const apiScript = document.createElement("script");
            apiScript.src = "https://www.youtube.com/iframe_api";
            apiScript.async = true;
            apiScript.onerror = function () {
                notify("error", { code: "api-script-load-failed" });
            };
            document.head.appendChild(apiScript);
        }
    </script>
</body>
</html>
